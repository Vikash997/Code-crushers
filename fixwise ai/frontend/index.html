<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FixWise AI</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-gray-900 text-white">

<div class="flex h-screen">

  <!-- Sidebar -->
  <div class="w-1/4 bg-gray-800 p-4 overflow-y-auto">
    <h2 class="text-xl font-bold mb-4">🧠 Memory</h2>
    <div id="memoryPanel" class="space-y-3 text-sm text-gray-300">
      <p>No past incidents yet.</p>
    </div>
  </div>

  <!-- Chat -->
  <div class="flex flex-col flex-1">

    <div class="p-4 border-b border-gray-700 flex justify-between">
      <h1 class="text-xl font-bold">⚡ FixWise AI</h1>
      <span class="text-sm text-green-400">Learning Enabled</span>
    </div>

    <div id="chat" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

    <div class="p-4 flex gap-2 border-t border-gray-700">
      <input id="input" class="flex-1 p-2 rounded bg-gray-700" />
      <button id="sendBtn" class="bg-blue-500 px-4 py-2 rounded">Send</button>
    </div>

  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
